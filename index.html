<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Biblioteca</title>
        <link rel="stylesheet" href="style.css">
        <script type="module" src="/dist/index.js"></script>
    </head>

    <body>

        <header>
            <h1>📚 Sistema de Biblioteca</h1>
        </header>

        <main class="container">

            <section class="cadastro">

                <h2>Cadastrar / Editar Livro</h2>

                <form class="form-book">

                <div class="field">
                    <label>Título</label>
                    <input id="input-title" name="title" type="text" placeholder="Digite o título">
                </div>

                <div class="field">
                    <label>Autor</label>
                    <input id="input-author" name="author" type="text" placeholder="Digite o autor">
                </div>

                <div class="field">
                    <label>Ano</label>
                    <input id="input-year" name="year" type="number" placeholder="Digite o ano">
                </div>

                <div class="field">
                    <label>ISBN</label>
                    <input id="input-isbn" name="isbn" type="text" placeholder="Digite o ISBN">
                </div>

                <div class="form-button">

                <button id="btn-save" type="submit" class="btn save">
                    Salvar
                </button>

                <button id="btn-cancel" type="reset" class="btn cancel">
                    Cancelar
                </button>

                </div>

                </form>

            </section>


            <section class="lista">

                <h2>Lista de Livros</h2>

                <table id="book-table">

                    <thead>
                        <tr>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Ano</th>
                        <th>ISBN</th>
                        <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody>

                        <!--Conteúdo gerado dinamicamente-->

                    </tbody>

                </table>

            </section>

        </main>

    </body>
</html>
